<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#ff6a00" />
    <title>MRP Mens Wear - Premium Men's Fashion</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='16' fill='%23ff6a00'/%3E%3Ctext x='50' y='68' font-size='60' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E"
    />

    <!-- Supabase + Razorpay loaded in body before app script -->

    <style>
      :root {
        --orange: #ff6a00;
        --orange-dark: #e85d00;
        --yellow: #ffc107;
        --yellow-dark: #f5b400;
        --ink: #1f1f1f;
        --ink-soft: #4a4a4a;
        --muted: #8a8a8a;
        --line: #ececec;
        --bg: #fafafa;
        --card: #ffffff;
        --success: #16a34a;
        --warning: #d97706;
        --error: #dc2626;
        --radius: 16px;
        --radius-sm: 10px;
        --shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
        --maxw: 480px;
        --font: "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--ink);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      img {
        display: block;
        max-width: 100%;
      }

      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      input,
      textarea,
      select {
        font-family: inherit;
        font-size: 15px;
      }

      /* App shell */
      #app {
        max-width: var(--maxw);
        margin: 0 auto;
        min-height: 100vh;
        background: var(--bg);
        position: relative;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.04);
        overflow-x: hidden;
      }

      .page {
        display: none;
        animation: fade 0.28s ease;
      }

      .page.active {
        display: block;
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: none;
        }
      }

      /* Navbar */
      .nav {
        position: sticky;
        top: 0;
        z-index: 50;
        background: linear-gradient(90deg, var(--orange), var(--yellow));
        color: #fff;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 2px 12px rgba(255, 106, 0, 0.25);
      }

      .nav__brand {
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 0.3px;
        flex: 1;
      }

      .nav__brand span {
        font-weight: 500;
        font-size: 11px;
        display: block;
        opacity: 0.9;
        letter-spacing: 1px;
      }

      .nav__icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.18);
        transition:
          background 0.2s,
          transform 0.15s;
      }

      .nav__icon:active {
        transform: scale(0.92);
      }

      .nav__icon:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .nav__icon svg {
        width: 20px;
        height: 20px;
        stroke: #fff;
        fill: none;
        stroke-width: 2;
      }

      .nav__back {
        display: none;
      }

      .nav__back svg {
        stroke: #fff;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 13px 18px;
        border-radius: var(--radius-sm);
        font-weight: 700;
        font-size: 15px;
        transition:
          transform 0.12s,
          box-shadow 0.2s,
          background 0.2s;
        width: 100%;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn--primary {
        background: linear-gradient(90deg, var(--orange), var(--orange-dark));
        color: #fff;
        box-shadow: 0 6px 16px rgba(255, 106, 0, 0.35);
      }

      .btn--primary:hover {
        box-shadow: 0 8px 22px rgba(255, 106, 0, 0.45);
      }

      .btn--whatsapp {
        background: #25d366;
        color: #fff;
        box-shadow: 0 6px 16px rgba(37, 211, 102, 0.3);
      }

      .btn--ghost {
        background: #fff;
        color: var(--ink);
        border: 1.5px solid var(--line);
      }

      .btn--ghost:hover {
        border-color: var(--orange);
        color: var(--orange);
      }

      .btn--block {
        display: flex;
        width: 100%;
      }

      .btn[disabled] {
        opacity: 0.5;
        pointer-events: none;
        filter: grayscale(0.4);
      }

      /* Hero */
      .hero {
        position: relative;
        background: linear-gradient(
          135deg,
          #ff6a00 0%,
          #ff8c2e 45%,
          #ffc107 100%
        );
        color: #fff;
        padding: 28px 20px 32px;
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -60px;
        bottom: -60px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
      }

      .hero__eyebrow {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        background: rgba(255, 255, 255, 0.22);
        padding: 5px 12px;
        border-radius: 999px;
        margin-bottom: 14px;
      }

      .hero__title {
        font-size: 30px;
        line-height: 1.15;
        font-weight: 800;
        margin: 0 0 10px;
      }

      .hero__title em {
        font-style: normal;
        color: #fff;
        text-decoration: underline;
        text-decoration-color: rgba(255, 255, 255, 0.5);
        text-underline-offset: 5px;
      }

      .hero__desc {
        font-size: 14px;
        opacity: 0.95;
        margin: 0 0 20px;
        max-width: 90%;
      }

      .hero__cta {
        display: flex;
        gap: 10px;
      }

      .hero__cta .btn {
        flex: 1;
      }

      .hero__img {
        margin-top: 22px;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        aspect-ratio: 16/10;
      }

      .hero__img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Section */
      .section {
        padding: 26px 16px;
      }

      .section__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .section__title {
        font-size: 19px;
        font-weight: 800;
        margin: 0;
      }

      .section__sub {
        font-size: 12px;
        color: var(--muted);
        margin: 2px 0 0;
      }

      .section__link {
        font-size: 13px;
        color: var(--orange);
        font-weight: 700;
      }

      /* Category cards */
      .cat-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .cat-card {
        position: relative;
        border-radius: var(--radius);
        overflow: hidden;
        aspect-ratio: 1/1.05;
        background: #eee;
        box-shadow: var(--shadow);
        transition: transform 0.18s;
      }

      .cat-card:active {
        transform: scale(0.97);
      }

      .cat-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s;
      }

      .cat-card:hover img {
        transform: scale(1.06);
      }

      .cat-card__label {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 14px 12px 12px;
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
      }

      .cat-card__label small {
        display: block;
        font-weight: 500;
        font-size: 11px;
        opacity: 0.85;
      }

      /* Feature cards */
      .feat-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .feat-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 16px 14px;
        box-shadow: var(--shadow);
        text-align: center;
        transition:
          transform 0.18s,
          box-shadow 0.2s;
      }

      .feat-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
      }

      .feat-card__icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        margin: 0 auto 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #fff3e0, #ffe0b2);
        color: var(--orange);
      }

      .feat-card__icon svg {
        width: 24px;
        height: 24px;
        stroke: var(--orange);
        fill: none;
        stroke-width: 2;
      }

      .feat-card__title {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 3px;
      }

      .feat-card__desc {
        font-size: 12px;
        color: var(--muted);
        margin: 0;
        line-height: 1.4;
      }

      /* Footer */
      .footer {
        background: #1a1a1a;
        color: #cfcfcf;
        padding: 26px 16px 30px;
        margin-top: 10px;
      }

      .footer__brand {
        color: #fff;
        font-weight: 800;
        font-size: 17px;
        margin-bottom: 4px;
      }

      .footer__tag {
        font-size: 12px;
        color: #888;
        margin: 0 0 16px;
      }

      .footer__row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin: 10px 0;
        font-size: 13px;
      }

      .footer__row svg {
        width: 18px;
        height: 18px;
        stroke: #ffb74d;
        fill: none;
        stroke-width: 2;
        flex-shrink: 0;
        margin-top: 2px;
      }

      .footer__social {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      .footer__social a {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #2a2a2a;
        transition:
          background 0.2s,
          transform 0.15s;
      }

      .footer__social a:hover {
        background: var(--orange);
        transform: translateY(-2px);
      }

      .footer__social svg {
        width: 18px;
        height: 18px;
        stroke: #fff;
        fill: none;
        stroke-width: 2;
      }

      .footer__copy {
        margin-top: 18px;
        font-size: 11px;
        color: #666;
        border-top: 1px solid #2a2a2a;
        padding-top: 14px;
      }

      /* Professional Footer */
      .pro-footer {
        background: #1a1a1a;
        color: #d4d4d4;
        padding: 0;
        margin-top: 16px;
        font-family: var(--font);
      }

      .pro-footer__top {
        padding: 24px 16px;
        border-bottom: 1px solid #2a2a2a;
      }

      .pro-footer__brand-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }

      .pro-footer__logo {
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, var(--orange), var(--yellow));
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 18px;
        color: #fff;
      }

      .pro-footer__brand-text {
        color: #fff;
        font-weight: 800;
        font-size: 18px;
        line-height: 1.2;
      }

      .pro-footer__brand-text small {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: #888;
        letter-spacing: 0.5px;
      }

      .pro-footer__desc {
        font-size: 13px;
        color: #999;
        margin: 8px 0 16px;
        line-height: 1.5;
      }

      .pro-footer__contact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 16px;
      }

      .pro-footer__contact-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 12px;
        background: #222;
        border-radius: 10px;
      }

      .pro-footer__contact-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .pro-footer__contact-icon--wa {
        background: rgba(37, 211, 102, 0.15);
        color: #25d366;
      }

      .pro-footer__contact-icon--email {
        background: rgba(255, 106, 0, 0.15);
        color: var(--orange);
      }

      .pro-footer__contact-icon--phone {
        background: rgba(255, 193, 7, 0.15);
        color: var(--yellow);
      }

      .pro-footer__contact-icon--location {
        background: rgba(100, 181, 246, 0.15);
        color: #64b5f6;
      }

      .pro-footer__contact-icon svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }

      .pro-footer__contact-label {
        font-size: 11px;
        color: #777;
        margin-bottom: 2px;
      }

      .pro-footer__contact-value {
        font-size: 13px;
        color: #fff;
        font-weight: 600;
      }

      .pro-footer__contact-value a {
        color: #fff;
        transition: color 0.2s;
      }

      .pro-footer__contact-value a:hover {
        color: var(--orange);
      }

      .pro-footer__links-section {
        padding: 0 16px;
        border-bottom: 1px solid #2a2a2a;
      }

      .pro-footer__links-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        cursor: pointer;
        user-select: none;
      }

      .pro-footer__links-title {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pro-footer__links-title svg {
        width: 18px;
        height: 18px;
        stroke: var(--orange);
        fill: none;
        stroke-width: 2;
      }

      .pro-footer__links-toggle {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s;
      }

      .pro-footer__links-toggle svg {
        width: 16px;
        height: 16px;
        stroke: #666;
        fill: none;
        stroke-width: 2;
      }

      .pro-footer__links-toggle.open {
        transform: rotate(180deg);
      }

      .pro-footer__links-list {
        display: none;
        padding-bottom: 12px;
        flex-direction: column;
        gap: 10px;
      }

      .pro-footer__links-list.open {
        display: flex;
      }

      .pro-footer__link {
        font-size: 13px;
        color: #999;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: color 0.2s;
        padding: 4px 0;
      }

      .pro-footer__link:hover {
        color: var(--orange);
      }

      .pro-footer__link svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        flex-shrink: 0;
      }

      .pro-footer__bottom {
        padding: 20px 16px;
        text-align: center;
      }

      .pro-footer__payment {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .pro-footer__payment-badge {
        padding: 6px 12px;
        background: #222;
        border-radius: 6px;
        font-size: 11px;
        color: #888;
        font-weight: 600;
      }

      .pro-footer__social-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .pro-footer__social-link {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #2a2a2a;
        transition: all 0.2s;
      }

      .pro-footer__social-link:hover {
        transform: translateY(-3px);
      }

      .pro-footer__social-link--wa:hover {
        background: #25d366;
      }

      .pro-footer__social-link--fb:hover {
        background: #1877f2;
      }

      .pro-footer__social-link--ig:hover {
        background: linear-gradient(
          45deg,
          #f09433,
          #e6683c,
          #dc2743,
          #cc2366,
          #bc1888
        );
      }

      .pro-footer__social-link svg {
        width: 20px;
        height: 20px;
        stroke: #fff;
        fill: none;
        stroke-width: 2;
      }

      .pro-footer__copyright {
        font-size: 12px;
        color: #666;
        line-height: 1.6;
      }

      .pro-footer__copyright strong {
        color: var(--orange);
        font-weight: 700;
      }

      .pro-footer__divider {
        height: 1px;
        background: #2a2a2a;
        margin: 0 16px;
      }

      /* Collections */
      .search-wrap {
        padding: 14px 16px 8px;
        background: #fff;
        position: sticky;
        top: 0;
        z-index: 20;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }

      .search-box {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--bg);
        border: 1.5px solid var(--line);
        border-radius: 999px;
        padding: 11px 16px;
        transition: border-color 0.2s;
      }

      .search-box:focus-within {
        border-color: var(--orange);
        background: #fff;
      }

      .search-box svg {
        width: 18px;
        height: 18px;
        stroke: var(--muted);
        fill: none;
        stroke-width: 2;
      }

      .search-box input {
        border: none;
        background: none;
        outline: none;
        flex: 1;
        font-size: 14px;
        color: var(--ink);
      }

      .chips {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 10px 16px 4px;
        background: #fff;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .chips::-webkit-scrollbar {
        display: none;
      }

      .chip {
        flex-shrink: 0;
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        background: var(--bg);
        border: 1.5px solid var(--line);
        color: var(--ink-soft);
        transition: all 0.2s;
      }

      .chip.active {
        background: linear-gradient(90deg, var(--orange), var(--yellow));
        color: #fff;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(255, 106, 0, 0.3);
      }

      .prod-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 14px 16px 30px;
      }

      .prod-card {
        background: var(--card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        transition:
          transform 0.18s,
          box-shadow 0.2s;
        cursor: pointer;
      }

      .prod-card:active {
        transform: scale(0.97);
      }

      .prod-card:hover {
        box-shadow: var(--shadow-lg);
      }

      .prod-card__img {
        aspect-ratio: 3/4;
        background: #eee;
        overflow: hidden;
      }

      .prod-card__img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s;
      }

      .prod-card:hover .prod-card__img img {
        transform: scale(1.05);
      }

      .prod-card__body {
        padding: 10px 12px 12px;
      }

      .prod-card__cat {
        font-size: 10px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .prod-card__name {
        font-size: 14px;
        font-weight: 700;
        margin: 3px 0 4px;
        line-height: 1.25;
      }

      .prod-card__price {
        font-size: 16px;
        font-weight: 800;
        color: var(--ink);
      }

      .prod-card__stock {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
        font-weight: 600;
      }

      .prod-card__stock .in {
        color: var(--success);
      }

      .prod-card__stock .out {
        color: var(--error);
      }

      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }

      .empty svg {
        width: 48px;
        height: 48px;
        stroke: var(--line);
        fill: none;
        stroke-width: 1.5;
        margin-bottom: 10px;
      }

      /* Product Details */
      .pd {
        padding-bottom: 90px;
      }

      .pd__img {
        width: 100%;
        aspect-ratio: 3/4;
        background: #eee;
        overflow: hidden;
      }

      .pd__img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .pd__body {
        padding: 18px 16px;
      }

      .pd__cat {
        font-size: 11px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .pd__name {
        font-size: 22px;
        font-weight: 800;
        margin: 4px 0 8px;
        line-height: 1.2;
      }

      .pd__desc {
        font-size: 14px;
        color: var(--ink-soft);
        margin: 0 0 16px;
        line-height: 1.55;
      }

      .pd__price {
        font-size: 26px;
        font-weight: 800;
        color: var(--ink);
        margin-bottom: 14px;
      }

      .pd__price small {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
      }

      .pd__label {
        font-size: 13px;
        font-weight: 700;
        margin: 16px 0 8px;
        color: var(--ink);
      }

      .sizes {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .size {
        min-width: 46px;
        padding: 9px 12px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 14px;
        border: 1.5px solid var(--line);
        background: #fff;
        color: var(--ink);
        transition: all 0.18s;
      }

      .size:hover {
        border-color: var(--orange);
        color: var(--orange);
      }

      .size.active {
        background: linear-gradient(90deg, var(--orange), var(--yellow));
        color: #fff;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(255, 106, 0, 0.3);
      }

      .size.out {
        opacity: 0.45;
        text-decoration: line-through;
        pointer-events: none;
      }

      .size-stock {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
        margin-top: 8px;
      }

      .size-stock .row {
        display: flex;
        justify-content: space-between;
        padding: 3px 0;
      }

      .size-stock .row span:last-child {
        font-weight: 700;
        color: var(--ink-soft);
      }

      .avail {
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .avail.in {
        background: #e8f7ef;
        color: var(--success);
      }

      .avail.out {
        background: #fdeaea;
        color: var(--error);
      }

      .qty {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 6px;
      }

      .qty__btn {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: var(--bg);
        border: 1.5px solid var(--line);
        font-size: 20px;
        font-weight: 700;
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .qty__btn:active {
        transform: scale(0.92);
      }

      .qty__val {
        font-size: 17px;
        font-weight: 800;
        min-width: 30px;
        text-align: center;
      }

      .pd__bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: var(--maxw);
        background: #fff;
        padding: 12px 16px;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
        z-index: 40;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .pd__bar .btn {
        flex: 1;
      }

      /* Cart / Delivery / Payment */
      .sheet {
        padding: 16px 16px 100px;
      }

      .field {
        margin-bottom: 14px;
      }

      .field label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 6px;
        color: var(--ink);
      }

      .field input,
      .field textarea,
      .field select {
        width: 100%;
        padding: 13px 14px;
        border: 1.5px solid var(--line);
        border-radius: 10px;
        background: #fff;
        outline: none;
        transition: border-color 0.2s;
        color: var(--ink);
      }

      .field input:focus,
      .field textarea:focus,
      .field select:focus {
        border-color: var(--orange);
      }

      .field.row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .err {
        font-size: 12px;
        color: var(--error);
        margin-top: 4px;
        display: none;
      }

      .err.show {
        display: block;
      }

      .cart-item {
        display: flex;
        gap: 12px;
        background: #fff;
        border-radius: var(--radius);
        padding: 10px;
        box-shadow: var(--shadow);
        margin-bottom: 10px;
      }

      .cart-item__img {
        width: 70px;
        height: 88px;
        border-radius: 8px;
        overflow: hidden;
        background: #eee;
        flex-shrink: 0;
      }

      .cart-item__img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .cart-item__body {
        flex: 1;
        min-width: 0;
      }

      .cart-item__name {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 2px;
      }

      .cart-item__meta {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 6px;
      }

      .cart-item__price {
        font-size: 15px;
        font-weight: 800;
      }

      .cart-item__rm {
        font-size: 12px;
        color: var(--error);
        font-weight: 700;
        margin-top: 6px;
      }

      .summary {
        background: #fff;
        border-radius: var(--radius);
        padding: 14px;
        box-shadow: var(--shadow);
        margin-top: 14px;
      }

      .summary__row {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        padding: 5px 0;
        color: var(--ink-soft);
      }

      .summary__row.total {
        font-size: 17px;
        font-weight: 800;
        color: var(--ink);
        border-top: 1.5px dashed var(--line);
        margin-top: 8px;
        padding-top: 10px;
      }

      .pay-opt {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 10px;
      }

      .pay-opt__card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        border-radius: var(--radius);
        border: 1.5px solid var(--line);
        background: #fff;
        transition: all 0.2s;
      }

      .pay-opt__card.active {
        border-color: var(--orange);
        background: #fff7ef;
      }

      .pay-opt__icon {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
      }

      .pay-opt__icon svg {
        width: 22px;
        height: 22px;
        stroke: var(--orange);
        fill: none;
        stroke-width: 2;
      }

      .pay-opt__title {
        font-size: 14px;
        font-weight: 700;
      }

      .pay-opt__desc {
        font-size: 12px;
        color: var(--muted);
      }

      .pay-opt__check {
        margin-left: auto;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .pay-opt__card.active .pay-opt__check {
        background: var(--orange);
        border-color: var(--orange);
      }

      .pay-opt__check svg {
        width: 12px;
        height: 12px;
        stroke: #fff;
        fill: none;
        stroke-width: 3;
        display: none;
      }

      .pay-opt__card.active .pay-opt__check svg {
        display: block;
      }

      /* Orders / Track */
      .order-card {
        background: #fff;
        border-radius: var(--radius);
        padding: 14px;
        box-shadow: var(--shadow);
        margin-bottom: 12px;
        cursor: pointer;
        transition: transform 0.15s;
      }

      .order-card:active {
        transform: scale(0.98);
      }

      .order-card__top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
      }

      .order-card__id {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }

      .order-card__date {
        font-size: 11px;
        color: var(--muted);
      }

      .order-card__items {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 8px;
      }

      .order-card__bot {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .order-card__total {
        font-size: 16px;
        font-weight: 800;
      }

      .badge {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
        text-transform: capitalize;
      }

      .badge.placed {
        background: #e3f2fd;
        color: #1976d2;
      }

      .badge.confirmed {
        background: #e8f7ef;
        color: var(--success);
      }

      .badge.packed {
        background: #fff8e1;
        color: #f57f17;
      }

      .badge.shipped {
        background: #fff3e0;
        color: var(--warning);
      }

      .badge.out_for_delivery {
        background: #f3e8ff;
        color: #7c3aed;
      }

      .badge.delivered {
        background: #e8f7ef;
        color: var(--success);
      }

      .badge.cancelled {
        background: #fdeaea;
        color: var(--error);
      }

      .badge.paid {
        background: #e8f7ef;
        color: var(--success);
      }

      .badge.pending {
        background: #fff3e0;
        color: var(--warning);
      }

      .badge.failed {
        background: #fdeaea;
        color: var(--error);
      }

      .track {
        padding: 20px 16px 100px;
      }

      .track__status {
        font-size: 13px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 14px;
      }

      .timeline {
        position: relative;
        padding-left: 28px;
      }

      .timeline::before {
        content: "";
        position: absolute;
        left: 9px;
        top: 6px;
        bottom: 6px;
        width: 2px;
        background: var(--line);
      }

      .tl-step {
        position: relative;
        padding-bottom: 22px;
      }

      .tl-step::before {
        content: "";
        position: absolute;
        left: -23px;
        top: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        border: 3px solid var(--line);
        transition: all 0.3s;
      }

      .tl-step.done::before {
        background: var(--success);
        border-color: var(--success);
      }

      .tl-step.current::before {
        background: var(--orange);
        border-color: var(--orange);
        box-shadow: 0 0 0 5px rgba(255, 106, 0, 0.2);
      }

      .tl-step__title {
        font-size: 14px;
        font-weight: 700;
        margin: 0;
      }

      .tl-step__desc {
        font-size: 12px;
        color: var(--muted);
        margin: 2px 0 0;
      }

      .tl-step.current .tl-step__title {
        color: var(--orange);
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--ink);
        color: #fff;
        padding: 12px 20px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s;
        max-width: 90%;
        text-align: center;
      }

      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* Loading overlay */
      #loadingOverlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.85);
        z-index: 200;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      #loadingOverlay.show {
        display: flex;
      }

      .spinner {
        width: 42px;
        height: 42px;
        border: 4px solid var(--line);
        border-top-color: var(--orange);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #loadingOverlay p {
        font-size: 14px;
        font-weight: 700;
        color: var(--ink);
        margin: 0;
      }

      /* Misc */
      .skeleton {
        background: linear-gradient(90deg, #eee, #f5f5f5, #eee);
        background-size: 200% 100%;
        animation: sk 1.2s infinite;
        border-radius: 8px;
      }

      @keyframes sk {
        0% {
          background-position: 200% 0;
        }

        100% {
          background-position: -200% 0;
        }
      }

      .muted {
        color: var(--muted);
      }

      .center {
        text-align: center;
      }

      /* DB status banner */
      #dbBanner {
        background: #fff3cd;
        color: #856404;
        font-size: 12px;
        padding: 8px 16px;
        text-align: center;
        font-weight: 600;
        display: none;
      }

      #dbBanner.show {
        display: block;
      }

      /* Footer Styles */
      .footer {
        background: linear-gradient(180deg, #1f1f1f 0%, #111 100%);
        color: #fff;
        padding: 40px 16px 20px;
        margin-top: 40px;
      }

      .footer__brand {
        text-align: center;
        margin-bottom: 30px;
      }

      .footer__brand h3 {
        font-size: 22px;
        font-weight: 800;
        margin: 0 0 8px;
        background: linear-gradient(90deg, var(--orange), var(--yellow));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .footer__brand p {
        font-size: 13px;
        color: #aaa;
        margin: 0;
        line-height: 1.5;
      }

      .footer__section {
        margin-bottom: 28px;
      }

      .footer__title {
        font-size: 15px;
        font-weight: 700;
        color: var(--orange);
        margin: 0 0 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .footer__title svg {
        width: 18px;
        height: 18px;
        stroke: var(--orange);
        fill: none;
        stroke-width: 2;
      }

      .footer__links {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .footer__links li {
        margin-bottom: 10px;
      }

      .footer__links a {
        color: #ccc;
        font-size: 14px;
        transition: color 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .footer__links a:hover {
        color: var(--orange);
      }

      .footer__links a svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        opacity: 0.7;
      }

      .footer__contact-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
        color: #ccc;
        font-size: 14px;
      }

      .footer__contact-item svg {
        width: 18px;
        height: 18px;
        stroke: var(--orange);
        fill: none;
        stroke-width: 2;
        flex-shrink: 0;
        margin-top: 2px;
      }

      .footer__contact-item a {
        color: #ccc;
        transition: color 0.2s;
      }

      .footer__contact-item a:hover {
        color: var(--orange);
      }

      .footer__social {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 24px 0;
      }

      .footer__social a {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .footer__social a:hover {
        background: var(--orange);
        transform: translateY(-3px);
      }

      .footer__social svg {
        width: 22px;
        height: 22px;
        fill: #fff;
        stroke: none;
      }

      .footer__divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 24px 0;
      }

      .footer__bottom {
        text-align: center;
      }

      .footer__copyright {
        font-size: 13px;
        color: #888;
        margin-bottom: 8px;
      }

      .footer__powered {
        font-size: 12px;
        color: #666;
      }

      .footer__powered a {
        color: var(--orange);
        font-weight: 600;
      }

      /* Footer Policy Modal */
      .policy-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .policy-modal.active {
        display: flex;
      }

      .policy-content {
        background: white;
        border-radius: var(--radius);
        max-width: 500px;
        width: 100%;
        max-height: 85vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: var(--shadow-lg);
      }

      .policy-header {
        background: linear-gradient(90deg, var(--orange), var(--yellow));
        color: white;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .policy-header h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .policy-close {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: none;
        transition: background 0.2s;
      }

      .policy-close:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .policy-body {
        padding: 24px 20px;
        overflow-y: auto;
        flex: 1;
        line-height: 1.6;
        color: var(--ink);
      }

      .policy-body h3 {
        font-size: 16px;
        font-weight: 700;
        margin: 20px 0 10px;
        color: var(--ink);
      }

      .policy-body h3:first-child {
        margin-top: 0;
      }

      .policy-body p {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .policy-body ul,
      .policy-body ol {
        margin: 0 0 16px;
        padding-left: 24px;
      }

      .policy-body li {
        margin-bottom: 8px;
        font-size: 14px;
      }

      .policy-body a {
        color: var(--orange);
        font-weight: 600;
      }

      .policy-body strong {
        color: var(--ink);
      }

      .auth-shell {
        display: grid;
        gap: 16px;
      }

      .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
        background: linear-gradient(180deg, #fff7ef 0%, var(--bg) 220px);
      }

      .auth-page__inner {
        width: 100%;
        max-width: 380px;
      }

      .auth-brand {
        text-align: center;
        margin-bottom: 22px;
      }

      .auth-brand__logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        margin: 0 auto 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--orange), var(--yellow));
        color: #fff;
        font-weight: 800;
        font-size: 22px;
        box-shadow: 0 8px 20px rgba(255, 106, 0, 0.28);
      }

      .auth-brand h2 {
        margin: 0;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .auth-brand span {
        display: block;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 1px;
        margin-top: 2px;
      }

      .auth-card {
        background: #fff;
        border-radius: 20px;
        padding: 26px 22px;
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.08);
      }

      .auth-card h1 {
        margin: 0 0 6px;
        font-size: 22px;
      }

      .auth-card p {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 14px;
      }

      .auth-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }

      .auth-tab {
        flex: 1;
        border: 1px solid #e5e7eb;
        border-radius: 999px;
        padding: 8px 10px;
        background: #f9fafb;
        color: var(--ink);
        font-weight: 600;
      }

      .auth-tab.active {
        background: var(--orange);
        color: white;
        border-color: var(--orange);
      }

      .auth-field {
        display: grid;
        gap: 6px;
        margin-bottom: 14px;
      }

      .auth-field label {
        font-size: 13px;
        font-weight: 600;
        color: var(--ink-soft);
      }

      .auth-field input,
      .auth-field textarea {
        width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 13px 14px;
        background: #fff;
        transition: border-color 0.15s;
      }

      .auth-field input:focus {
        outline: none;
        border-color: var(--orange);
      }

      .auth-row {
        display: flex;
        justify-content: flex-end;
        margin: -6px 0 14px;
      }

      .auth-footer {
        margin-top: 18px;
        text-align: center;
      }

      .auth-link {
        color: var(--orange);
        font-weight: 600;
        background: transparent;
        border: none;
        padding: 0;
        font-size: 14px;
      }

      /* User avatar (nav + account page) */
      .user-avatar {
        position: relative;
        display: inline-flex;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.25);
      }

      .user-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .user-avatar__fallback {
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        background: #fff;
        color: var(--orange);
        font-weight: 800;
      }

      .nav__avatar {
        background: rgba(255, 255, 255, 0.18);
      }

      /* ---------- App state ---------- */

      function isAuthenticated() {
        return Boolean(state.auth.user);

      const KNOWN_VISITOR_KEY = "mrp_known_visitor";
      function isKnownVisitor() {
        try {
          return localStorage.getItem(KNOWN_VISITOR_KEY) === "1";
        } catch (e) {
          return false;
        }
      }
      function markKnownVisitor() {
        try {
          localStorage.setItem(KNOWN_VISITOR_KEY, "1");
        } catch (e) {}
      }
      function defaultAuthMode() {
        return isKnownVisitor() ? "login" : "signup";
      }

      function getUserAvatarUrl() {
        const meta = state.auth.user?.user_metadata || {};
        return meta.avatar_url || meta.picture || null;
      }

      function getUserInitial() {
        const name =
          state.auth.profile?.full_name ||
          state.auth.user?.user_metadata?.full_name ||
          "";
        if (name.trim()) return name.trim().charAt(0).toUpperCase();
        const email = state.auth.user?.email || "";
        return email.trim().charAt(0).toUpperCase() || "U";
      }

      function renderUserAvatar(size = 36) {
        const url = getUserAvatarUrl();
        const initial = esc(getUserInitial());
        const fallback = `<span class="user-avatar__fallback" style="display:${url ? "none" : "flex"}">${initial}</span>`;
        const img = url
          ? `<img src="${esc(url)}" alt="" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />`
          : "";
        return `<span class="user-avatar" style="width:${size}px;height:${size}px">${img}${fallback}</span>`;
      }

      function setAuthMode(mode) {
        state.auth.mode = mode;
        renderRoute("auth", { mode }, { runMount: true });
      }

      async function refreshCustomerProfile(userId) {
        if (!userId || !window.MRPDB) {
          state.auth.profile = null;
          return;
        }
        try {
          const { profile, error } = await MRPDB.fetchProfile(userId);
          if (!error) {
            state.auth.profile = profile || null;
          }
        } catch (e) {
          console.warn("[MRP] profile refresh failed", e.message);
        }
      }

      async function initializeAuth() {
        if (!window.MRPDB) return;
        state.auth.loading = true;
        try {
          const { session, error } = await MRPDB.getSession();
          if (error) {
            console.warn("[MRP] session restore failed", error.message);
          }
          if (session?.user) {
            state.auth.session = session;
            state.auth.user = session.user;
            markKnownVisitor();
            await refreshCustomerProfile(session.user.id);
            subscribeToOrders();
            try {
              await MRPDB.linkOrdersToUser(
                session.user.id,
                session.user.phone || "",
              );
            } catch (linkErr) {
              console.warn("[MRP] order-linking skipped", linkErr.message);
            }
          } else {
            state.auth.user = null;
            state.auth.session = null;
            state.auth.profile = null;
          }
        } catch (e) {
          console.warn("[MRP] auth init failed", e.message);
        } finally {
          state.auth.initialized = true;
          state.auth.loading = false;
        }
      }

      async function handleSuccessfulAuth(
        user,
        session,
        message = "Welcome back!",
      ) {
        state.auth.user = user || null;
        state.auth.session = session || null;
        markKnownVisitor();
        if (user?.id) {
          await refreshCustomerProfile(user.id);
          subscribeToOrders();
        }
        toast(message);
        if (postAuthRedirect) {
          const dest = postAuthRedirect.name;
          const params = postAuthRedirect.params;
          postAuthRedirect = null;
          go(dest, params, { replace: true });
        } else {
          go("home", {}, { replace: true });
        }
      }

      function attachAuthListener() {
        if (
          !window.MRPDB ||
          typeof window.MRPDB.onAuthStateChange !== "function"
        )
          return;
        window.MRPDB.onAuthStateChange(async ({ event, user, session }) => {
          if (event === "SIGNED_OUT") {
            state.auth.user = null;
            state.auth.session = null;
            state.auth.profile = null;
            unsubscribeFromOrders();
            if (routeState.name !== "auth") {
              go("auth", { mode: defaultAuthMode() }, { replace: true });
            }
            return;
          }
          if (user) {
            state.auth.user = user;
            state.auth.session = session || null;
            await refreshCustomerProfile(user.id);
            subscribeToOrders();
          }
        });
      }
      async function submitAuth(mode) {
        if (!window.MRPDB) {
          toast("Supabase is not loaded");
          return;
        }
        const email = ($("#authEmail")?.value || "").trim();
        const password = $("#authPassword") ? $("#authPassword").value : "";
        const confirmPassword = $("#authConfirmPassword")
          ? $("#authConfirmPassword").value
          : "";
        const name = $("#authName") ? $("#authName").value.trim() : "";
        const phone = $("#authPhone") ? $("#authPhone").value.trim() : "";
        if (!email) {
          toast("Please enter your email");
          return;
        }
        if (mode === "signup" && !name) {
          toast("Please enter your full name");
          return;
        }
        if (mode === "signup" && !/^[0-9]{10}$/.test(phone)) {
          toast("Please enter a valid 10-digit phone number");
          return;
        }
        if ((mode === "login" || mode === "signup") && password.length < 6) {
          toast("Password must be at least 6 characters");
          return;
        }
        if (mode === "signup" && password !== confirmPassword) {
          toast("Passwords do not match");
          return;
        }

        showLoading(
          mode === "forgot" ? "Sending reset email..." : "Authenticating...",
        );
        try {
          if (mode === "forgot") {
            const { error } = await MRPDB.resetPassword(email);
            if (error) throw error;
            toast("Password reset email sent. Check your inbox.");
            setAuthMode("login");
            return;
          }

          if (mode === "signup") {
            const { user, session, error } = await MRPDB.signUp(
              email,
              password,
              {
                full_name: name,
                phone: phone,
              },
            );
            if (error) throw error;
            if (session?.user || user) {
              const u = user || session?.user;
              try {
                await MRPDB.upsertProfile(u.id, {
                  full_name: name,
                  phone: phone,
                  email: email,
                });
              } catch (profileErr) {
                console.warn(
                  "[MRP] Explicit profile upsert failed:",
                  profileErr.message,
                );
              }
              await handleSuccessfulAuth(
                u,
                session,
                "Account created successfully!",
              );
            } else {
              toast(
                "Account created. Please confirm your email to start shopping.",
              );
              setAuthMode("login");
            }
            return;
          }

          const { user, session, error } = await MRPDB.signIn(email, password);
          if (error) throw error;
          if (!session?.user && !user) {
            throw new Error("Sign-in failed");
          }
          await handleSuccessfulAuth(
            user || session?.user,
            session,
            "Signed in successfully!",
          );
        } catch (err) {
          console.error("[MRP] auth submit failed", err);
          toast(err?.message || "Authentication failed. Please try again.");
        } finally {
          hideLoading();
        }
      }

      async function signOutCustomer() {
        try {
          unsubscribeFromOrders();
          const { error } = await MRPDB.signOut();
          if (error) throw error;
          state.auth.user = null;
          state.auth.session = null;
          state.auth.profile = null;
          state.checkout.delivery = {};
          markKnownVisitor();
          toast("Signed out successfully");
          go("auth", { mode: "login" }, { replace: true });
        } catch (err) {
          console.error("[MRP] sign out failed", err);
          toast(err?.message || "Could not sign out");
        }
      }

      async function saveCustomerProfile() {
        if (!state.auth.user?.id || !window.MRPDB) return;
        const name = $("#profileName").value.trim();
        const phone = $("#profilePhone").value.trim();
        try {
          showLoading("Saving profile...");
          const { profile, error } = await MRPDB.upsertProfile(
            state.auth.user.id,
            {
              full_name: name,
              phone,
              email: state.auth.user.email,
            },
          );
          if (error) throw error;
          state.auth.profile = profile || state.auth.profile;
          toast("Profile updated");
          renderRoute("account", {}, { runMount: false });
        } catch (err) {
          console.error("[MRP] profile save failed", err);
          toast(err?.message || "Could not save profile");
        } finally {
          hideLoading();
        }
      }

      function clearPersistedOrderData() {
        try {
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(ORDER_HISTORY_KEY);
          for (let i = localStorage.length - 1; i >= 0; i--) {
            const key = localStorage.key(i);
            if (key && key.startsWith(`${ORDER_HISTORY_KEY}:`)) {
              localStorage.removeItem(key);
            }
          }
        } catch (e) {
          // ignore
        }
      }

      function getCustomerScope() {
        try {
          let scope = localStorage.getItem(CUSTOMER_SCOPE_KEY);
          if (!scope) {
            scope = `cust-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
            localStorage.setItem(CUSTOMER_SCOPE_KEY, scope);
          }
          return scope;
        } catch (e) {
          return "default";
        }
      }

      function sanitizeOrderForStorage(order) {
        if (!order || !order.id) return null;
        const safe = {
          ...order,
          created_at: order.created_at || new Date().toISOString(),
          status: order.status || "placed",
          payment_status: order.payment_status || "pending",
          payment_method: order.payment_method || "cod",
          total: order.total,
          subtotal: order.subtotal,
          shipping: order.shipping,
          items: Array.isArray(order.items)
            ? order.items.map((it) => ({ ...it }))
            : [],
        };
        delete safe.customer_name;
        delete safe.email;
        delete safe.phone;
        delete safe.address;
        delete safe.city;
        delete safe.state;
        delete safe.pincode;
        return safe;
      }

      function loadPersistedOrder() {
        try {
          state.lastOrder = null;
          const scope = getCustomerScope();
          const history = localStorage.getItem(`${ORDER_HISTORY_KEY}:${scope}`);
          if (history) {
            const parsed = JSON.parse(history);
            state.orderHistory = Array.isArray(parsed)
              ? parsed.map(sanitizeOrderForStorage).filter(Boolean)
              : [];
          } else {
            state.orderHistory = [];
          }
        } catch (e) {
          state.orderHistory = [];
        }
      }

      function persistOrder(order) {
        state.lastOrder = order || null;
      }

      function persistOrderHistory(orders) {
        try {
          const scopedKey = `${ORDER_HISTORY_KEY}:${getCustomerScope()}`;
          const nextOrders = (Array.isArray(orders) ? orders : [])
            .map(sanitizeOrderForStorage)
            .filter(Boolean);
          if (nextOrders.length) {
            localStorage.setItem(scopedKey, JSON.stringify(nextOrders));
          } else {
            localStorage.removeItem(scopedKey);
          }
        } catch (e) {
          // ignore
        }
      }

      function sortOrdersForDisplay(orders) {
        return [...(orders || [])].filter(Boolean).sort((a, b) => {
          const da = new Date(a.created_at || 0).getTime();
          const db = new Date(b.created_at || 0).getTime();
          return da - db;
        });
      }

      function dedupeOrders(orders) {
        const map = new Map();
        (orders || []).forEach((order) => {
          if (!order || !order.id) return;
          const key = String(order.id);
          const prev = map.get(key);
          map.set(key, prev ? { ...prev, ...order } : { ...order });
        });
        return Array.from(map.values());
      }

      function getOrdersForPhone(phone) {
        let filtered = state.orderHistory || [];
        if (!filtered.length && state.lastOrder) {
          filtered = [state.lastOrder];
        }
        return sortOrdersForDisplay(filtered);
      }

      function buildOrderPayload(orderPayload) {
        return {
          ...orderPayload,
          user_id: state.auth.user?.id || null,
        };
      }

      function appendOrderToHistory(order) {
        if (!order || !order.id) return;
        const normalizedOrder = sanitizeOrderForStorage({
          ...order,
          created_at: order.created_at || new Date().toISOString(),
        });
        if (!normalizedOrder) return;
        const nextHistory = dedupeOrders([
          ...(state.orderHistory || []),
          normalizedOrder,
        ]);
        state.orderHistory = sortOrdersForDisplay(nextHistory);
        persistOrderHistory(state.orderHistory);
      }

      function findOrderInCache(id) {
        const target = String(id || "").trim();
        if (!target) return null;
        const candidates = [
          ...(state.orderHistory || []),
          ...(state.lastOrder ? [state.lastOrder] : []),
        ];
        return (
          candidates.find(
            (entry) => String(entry?.id || "").trim() === target,
          ) || null
        );
      }

      function isLikelyOrderId(id) {
        const value = String(id || "").trim();
        if (!value) return false;
        return (
          /^[0-9]+$/.test(value) ||
          /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(
            value,
          ) ||
          value.startsWith("SAMPLE-") ||
          value.startsWith("RZP-")
        );
      }

      /* ---------- Helpers ---------- */
      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) =>
        Array.from(root.querySelectorAll(sel));
      const money = (n) => "₹" + Number(n).toLocaleString("en-IN");
      const esc = (s) =>
        String(s).replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );

      function toast(msg, dur = 2400) {
        const t = $("#toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove("show"), dur);
      }

      function showLoading(msg = "Please wait...") {
        $("#loadingMsg").textContent = msg;
        $("#loadingOverlay").classList.add("show");
      }
      function hideLoading() {
        $("#loadingOverlay").classList.remove("show");
      }

      function setLastOrder(order) {
        state.lastOrder = order || null;
        if (order) {
          appendOrderToHistory(order);
        } else {
          persistOrder(null);
        }
      }

      function findProduct(id) {
        return state.products.find((p) => String(p.id) === String(id));
      }
      function sizeEntry(product, size) {
        return (product.sizes || []).find((s) => s.size === size);
      }
      function normalizeProductStock(product) {
        const sizes = Array.isArray(product.sizes)
          ? product.sizes.map((s) => ({
              ...s,
              stock: Number(s && s.stock) || 0,
            }))
          : [];
        const derivedTotal = sizes.reduce(
          (sum, s) => sum + (Number(s.stock) || 0),
          0,
        );
        const totalStock = Number(product.total_stock ?? derivedTotal) || 0;
        return {
          ...product,
          total_stock: totalStock > 0 ? totalStock : derivedTotal,
          sizes,
        };
      }

      let productsChannel = null;

      function subscribeToProducts() {
        if (productsChannel || !window.MRPDB || !window.MRPDB.client) return;
        productsChannel = window.MRPDB.client.channel("customer-products");
        productsChannel
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table: "products" },
            () => {
              loadProducts({ rerender: true }).catch((e) =>
                console.warn("[MRP] product refresh failed:", e.message),
              );
            },
          )
          .subscribe();
      }

      let ordersChannel = null;

      function subscribeToOrders() {
        if (
          ordersChannel ||
          !window.MRPDB ||
          !window.MRPDB.client ||
          !state.auth.user?.id
        )
          return;
        ordersChannel = window.MRPDB.client.channel("customer-orders");
        ordersChannel
          .on(
            "postgres_changes",
            {
              event: "UPDATE",
              schema: "public",
              table: "orders",
              filter: `user_id=eq.${state.auth.user.id}`,
            },
            (payload) => {
              const updatedOrder = payload.new;
              if (
                state.lastOrder &&
                String(state.lastOrder.id) === String(updatedOrder.id)
              ) {
                state.lastOrder = { ...state.lastOrder, ...updatedOrder };
              }
              state.orderHistory = (state.orderHistory || []).map((o) =>
                String(o.id) === String(updatedOrder.id)
                  ? { ...o, ...updatedOrder }
                  : o,
              );
              persistOrderHistory(state.orderHistory);

              const currentRoute = routeState.name;
              if (
                ["orders", "orderdetails", "track"].includes(currentRoute) &&
                routes[currentRoute]
              ) {
                renderRoute(currentRoute, routeState.params, {
                  runMount: true,
                });
              }
              toast(
                `Order status updated to: ${updatedOrder.status.replace(/_/g, " ")}`,
              );
            },
          )
          .subscribe();
      }

      function unsubscribeFromOrders() {
        if (!ordersChannel || !window.MRPDB || !window.MRPDB.client) return;
        window.MRPDB.client.removeChannel(ordersChannel);
        ordersChannel = null;
      }

      /* ---------- Star rating helper ---------- */
      function renderStars(rating, size = 16) {
        const r = Math.max(0, Math.min(5, parseFloat(rating) || 0));
        let html = "";
        for (let i = 1; i <= 5; i++) {
          const diff = r - (i - 1);
          if (diff >= 1) {
            html += `<span style="color:#f59e0b;font-size:${size}px">★</span>`;
          } else if (diff >= 0.5) {
            html += `<span style="font-size:${size}px;position:relative;display:inline-block;color:#d1d5db">★<span style="position:absolute;left:0;top:0;overflow:hidden;width:50%;color:#f59e0b">★</span></span>`;
          } else {
            html += `<span style="color:#d1d5db;font-size:${size}px">★</span>`;
          }
        }
        return html;
      }

      /* ---------- Product loading (Supabase → fallback to sample) ---------- */
      async function loadProducts(options = {}) {
        if (window.MRPDB) {
          try {
            const rows = await MRPDB.fetchProducts();
            if (rows && rows.length) {
              state.products = rows.map((r) =>
                normalizeProductStock({
                  id: r.id,
                  name: r.name,
                  category: r.category,
                  description: r.description,
                  image: r.image || r.image_url,
                  price: r.price,
                  mrp: r.mrp || r.price,
                  total_stock: r.total_stock,
                  rating: r.rating,
                  sizes: Array.isArray(r.sizes) ? r.sizes : [],
                }),
              );
              state.usingSample = false;
              if (options.rerender !== false && routes[routeState.name]) {
                renderRoute(routeState.name, routeState.params, {
                  runMount: true,
                });
              }
              return;
            }
          } catch (e) {
            console.warn(
              "[MRP] Supabase products fetch failed, using sample:",
              e.message,
            );
          }
        }
        state.products = SAMPLE_PRODUCTS.slice();
        state.usingSample = true;
        if (options.rerender !== false && routes[routeState.name]) {
          renderRoute(routeState.name, routeState.params, { runMount: true });
        }
      }

      /* ---------- Order persistence (Supabase + admin visibility) ---------- */
      async function saveOrderToSupabase(
        orderPayload,
        paymentMethod,
        paymentStatus,
        extraFields = {},
      ) {
        if (!window.MRPDB) {
          const fallbackOrder = {
            id: `LOCAL-${Date.now()}`,
            ...orderPayload,
            payment_status: paymentStatus,
            payment_method: paymentMethod,
            status: "placed",
            created_at: new Date().toISOString(),
            ...extraFields,
            _localFallback: true,
          };
          setLastOrder(fallbackOrder);
          return fallbackOrder;
        }

        const VALID_ORDER_STATUSES = [
          "placed",
          "confirmed",
          "packed",
          "shipped",
          "out_for_delivery",
          "delivered",
          "cancelled",
        ];
        const safeStatus = VALID_ORDER_STATUSES.includes(extraFields.status)
          ? extraFields.status
          : "placed";
        const row = buildOrderPayload({
          customer_name: orderPayload.customer_name,
          email: orderPayload.email || null,
          phone: orderPayload.phone,
          address: orderPayload.address,
          city: orderPayload.city,
          state: orderPayload.state || "Tamil Nadu",
          pincode: orderPayload.pincode,
          items: orderPayload.items,
          subtotal: orderPayload.subtotal,
          shipping: orderPayload.shipping,
          total: orderPayload.total,
          payment_method: paymentMethod,
          payment_status: paymentStatus,
          ...extraFields,
          status: safeStatus,
        });

        let saved = null;
        try {
          saved = await MRPDB.createOrder(row);
          if (!saved || !saved.id) {
            throw new Error("Order could not be created");
          }

          if (saved.id && orderPayload.items && orderPayload.items.length) {
            const orderItems = orderPayload.items.map((it) => ({
              order_id: saved.id,
              product_id: it.productId || null,
              name: it.name,
              size: it.size,
              price: it.price,
              quantity: it.qty,
            }));
            try {
              await MRPDB.createOrderItems(orderItems);
            } catch (e) {
              console.warn("[MRP] order_items insert:", e.message);
            }
          }

          const shouldDeduct =
            String(paymentStatus).toLowerCase() === "paid" &&
            String(paymentMethod).toLowerCase() !== "cod";
          if (shouldDeduct) {
            for (const it of orderPayload.items || []) {
              if (it.productId && it.size && it.qty) {
                try {
                  await MRPDB.deductStock(
                    String(it.productId),
                    it.size,
                    it.qty,
                  );
                } catch (e) {
                  console.error("[MRP] stock deduction failed:", e);
                  await MRPDB.updateOrder(saved.id, {
                    payment_status: "failed",
                    status: "cancelled",
                  }).catch(() => {});
                  throw new Error(
                    `Stock unavailable for ${it.name || it.size}`,
                  );
                }
              }
            }
          }
          return saved;
        } catch (err) {
          console.warn(
            "[MRP] order save failed, using local fallback:",
            err.message,
          );
          const fallbackOrder = {
            id: `LOCAL-${Date.now()}`,
            ...orderPayload,
            payment_status: paymentStatus,
            payment_method: paymentMethod,
            status: safeStatus,
            created_at: new Date().toISOString(),
            ...extraFields,
            _localFallback: true,
          };
          setLastOrder(fallbackOrder);
          return fallbackOrder;
        }
      }

      async function saveCODOrder(orderPayload) {
        return saveOrderToSupabase(orderPayload, "cod", "pending");
      }

      /* ---------- Router ---------- */
      const routes = {};
      let routeState = { name: "home", params: {} };

      function normalizeRouteParams(params = {}) {
        const next = {};
        Object.entries(params || {}).forEach(([key, value]) => {
          if (value === undefined || value === null || value === "") return;
          next[key] = String(value);
        });
        return next;
      }

      function loadRazorpayScript() {
        return new Promise((resolve) => {
          if (window.Razorpay) {
            resolve(true);
            return;
          }
          const script = document.createElement("script");
          script.src = "https://checkout.razorpay.com/v1/checkout.js";
          script.onload = () => resolve(true);
          script.onerror = () => resolve(false);
          document.body.appendChild(script);
        });
      }

      function buildRouteUrl(name, params = {}) {
        const safeParams = normalizeRouteParams(params);
        const pairs = Object.entries(safeParams).map(
          ([key, value]) =>
            `${encodeURIComponent(key)}=${encodeURIComponent(value)}`,
        );
        const suffix = pairs.length ? `?${pairs.join("&")}` : "";
        return `#${encodeURIComponent(name)}${suffix}`;
      }

      function parseRouteFromUrl() {
        const hash = (window.location.hash || "").replace(/^#/, "");
        if (!hash) return { name: "home", params: {} };
        const [routeName, query = ""] = hash.split("?");
        const params = {};
        query
          .split("&")
          .filter(Boolean)
          .forEach((part) => {
            const [key, value = ""] = part.split("=");
            if (!key) return;
            params[decodeURIComponent(key)] = decodeURIComponent(value);
          });
        return {
          name: decodeURIComponent(routeName || "home"),
          params,
        };
      }

      function register(name, render, onMount) {
        routes[name] = { render, onMount };
      }

      function renderRoute(name, params = {}, { runMount = true } = {}) {
        const route = routes[name];
        if (!route) {
          console.warn("No route:", name);
          return;
        }
        const app = $("#app");
        app.scrollTop = 0;
        app.innerHTML = route.render(params || {});
        if (params && params.focusSearch) {
          const s = $("#searchInput");
          if (s) setTimeout(() => s.focus(), 120);
        }
        if (runMount && typeof route.onMount === "function") {
          Promise.resolve(route.onMount(params || {})).catch((e) =>
            console.error("[MRP] onMount error:", e),
          );
        }
      }

      let postAuthRedirect = null;

      function go(name, params = {}, options = {}) {
        const route = routes[name];
        if (!route) {
          console.warn("No route:", name);
          return;
        }
        const safeParams = normalizeRouteParams(params || {});

        if (isAuthenticated() && name === "auth") {
          go("home", {}, { replace: true });
          return;
        }

        // AUTHENTICATION GUARD FOR PROTECTED ROUTES:
        // Gate all routes except 'auth' if not authenticated.
        const shouldGate = !isAuthenticated() && name !== "auth";
        if (shouldGate) {
          postAuthRedirect = { name, params: safeParams };
          const redirectParams = { mode: defaultAuthMode() };
          routeState = { name: "auth", params: redirectParams };
          const url = buildRouteUrl("auth", redirectParams);
          if (options.replace) {
            history.replaceState(routeState, "", url);
          } else {
            history.pushState(routeState, "", url);
          }
          renderRoute("auth", redirectParams, { runMount: true });
          return;
        }

        routeState = { name, params: safeParams };
        const url = buildRouteUrl(name, safeParams);
        if (options.replace) {
          history.replaceState(routeState, "", url);
        } else {
          history.pushState(routeState, "", url);
        }
        renderRoute(name, safeParams, { runMount: true });
      }

      function handlePopState(event) {
        const incoming = event.state || parseRouteFromUrl();
        const nextName = incoming && incoming.name ? incoming.name : "home";
        const nextParams = normalizeRouteParams(
          incoming && incoming.params ? incoming.params : {},
        );
        routeState = { name: nextName, params: nextParams };
        renderRoute(nextName, nextParams, { runMount: true });
      }

      function back() {
        if (window.history.length > 1 && window.location.hash) {
          history.back();
          return;
        }
        go("home", {}, { replace: true });
      }

      window.addEventListener("popstate", handlePopState);

      function renderProductGrid() {

        let list = state.products.slice();
        const q = state.filter.q;
        if (q)
          list = list.filter(
            (p) =>
              p.name.toLowerCase().includes(q) ||
              p.category.toLowerCase().includes(q),
          );
        if (state.filter.cat !== "All")
          list = list.filter((p) => p.category === state.filter.cat);
        if (!list.length) {
          grid.innerHTML = `<div class="empty" style="grid-column:1/-1">${I.search}<p>No products found</p></div>`;
          return;
        }
        grid.innerHTML = list
          .map((p) => {

          <p>Product not found.</p><button class="btn btn--primary" style="max-width:200px;margin:14px auto 0" onclick="go('collections')">Browse Products</button></div>`;

        return `
          <nav class="nav">
            <button class="nav__icon nav__back" onclick="back()" aria-label="Back">${I.back}</button>
            <div class="nav__brand">Product Details</div>
            <div style="display:flex;gap:8px">

          </nav>
          <div class="pd">
            <div class="pd__img"><img src="${product.image || FALLBACK_IMG}" alt="${esc(product.name)}" /></div>
            <div class="pd__body">
              <div class="pd__cat">${product.category}</div>
              <h1 class="pd__name">${esc(product.name)}</h1>
              <p class="pd__desc">${esc(product.description)}</p>
              <div class="pd__price" id="pdPrice">${money(product.price)} <small>per piece</small></div>
