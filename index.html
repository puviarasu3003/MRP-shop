                <span style="font-size:18px;font-weight:600;color:#f59e0b;">${parseFloat(product.rating || 0).toFixed(1)}</span>
                <span style="display:flex;align-items:center;">${renderStars(product.rating, 18)}</span>
                <span style="color:#6b7280;font-size:13px;">(${product.rating ? "Customer Rating" : "No ratings yet"})</span>
              </div>
              <div class="pd__label">Select Size</div>
              <div class="sizes" id="sizes">
                ${(product.sizes || [])
                  .map(
                    (s) => `
                  <button class="size ${s.stock <= 0 ? "out" : ""}" data-size="${s.size}" data-price="${s.price}" data-stock="${s.stock}" onclick="selectSize('${product.id}','${s.size}')" ${s.stock <= 0 ? "disabled" : ""}>${s.size}</button>
                `,
                  )
                  .join("")}
              </div>
              <div id="availBox"></div>
              <div class="pd__label">Quantity</div>
              <div class="qty">
                <button class="qty__btn" onclick="changeQty(-1)">−</button>
                <div class="qty__val" id="qtyVal">1</div>
                <button class="qty__btn" onclick="changeQty(1)">+</button>
              </div>
            </div>
          </div>
          <div class="pd__bar">
            <button class="btn btn--primary" id="addCartBtn" onclick="addToCartFromDetails('${product.id}')" disabled>Select a Size</button>
          </div>
        `;
      });

      let _pdState = { productId: null, size: null, qty: 1 };
      function selectSize(productId, size) {
        const product = findProduct(productId);
        if (!product) return;
        const s = sizeEntry(product, size);
        if (!s || s.stock <= 0) {
          const box = $("#availBox");
          const btn = $("#addCartBtn");
          if (box) {
            box.innerHTML = `<div class="avail out">${I.box} Out of Stock — this size is unavailable</div>`;
          }
          if (btn) {
            btn.disabled = true;
            btn.textContent = "Out of Stock";
          }
          return;
        }
        _pdState = { productId, size, qty: 1 };
        $$("#sizes .size").forEach((el) =>
          el.classList.toggle("active", el.dataset.size === size),
        );
        $("#pdPrice").innerHTML = `${money(s.price)} <small>per piece</small>`;
        $("#qtyVal").textContent = "1";
        const box = $("#availBox");
        const btn = $("#addCartBtn");
        if (s.stock <= 0) {
          box.innerHTML = `<div class="avail out">${I.box} Out of Stock — this size is unavailable</div>`;
          btn.disabled = true;
          btn.textContent = "Out of Stock";
        } else {
          box.innerHTML = `<div class="avail in">${I.check} Available Stock: ${s.stock}</div>`;
          btn.disabled = false;
          btn.textContent = "Buy Now";
        }
      }
      function changeQty(delta) {
        if (!_pdState.size) return;
        const product = findProduct(_pdState.productId);
        if (!product) return;
        const s = sizeEntry(product, _pdState.size);
        if (!s) return;
        let q = _pdState.qty + delta;
        if (q < 1) q = 1;
        if (q > s.stock) q = s.stock;
        _pdState.qty = q;
        $("#qtyVal").textContent = q;
      }

      async function confirmOrder() {
        if (state._orderLock) {
          toast("Processing... please wait");
          return;
        }
        const c = state.checkout;
        if (!c.product || !c.size || !c.delivery || !c.delivery.name) {
          toast("Missing order details");
          return;
        }

        if (
          !confirm(
            "Please verify your order details before making the payment. Once the payment is completed, the amount cannot be refunded. Do you want to continue?",
          )
        ) {
          return;
        }

        const d = c.delivery;
        const p = c.product;
        const btn = $("#confirmOrderBtn");
        if (btn) btn.disabled = true;
        state._orderLock = true;

        showLoading("Preparing payment window...");
        const loaded = await loadRazorpayScript();
        hideLoading();
        if (!loaded) {
          toast(
            "Failed to load payment gateway. Please check your connection.",
          );
          if (btn) btn.disabled = false;
          state._orderLock = false;
          return;
        }

        let liveStock = null;
        if (window.MRPDB) {
          try {
            liveStock = await MRPDB.getProductStock(String(p.id));
          } catch (e) {
            console.warn(
              "[MRP] live stock check failed, using cached:",
              e.message,
            );
          }
        }
        const sizesToCheck =
          liveStock && Array.isArray(liveStock.sizes)
            ? liveStock.sizes
            : p.sizes;
        const s = (sizesToCheck || []).find(
          (entry) =>
            String(entry.size).toLowerCase() === String(c.size).toLowerCase(),
        );
        if (!s || Number(s.stock || 0) < c.qty) {
          if (btn) btn.disabled = false;
          state._orderLock = false;
          toast(
            `Sorry, size ${c.size} just sold out. Please go back and reselect.`,
          );
          return;
        }

        const orderPayload = {
          customer_name: d.name,
          email: d.email || null,
          phone: d.phone,
          address: d.address,
          city: d.city,
          state: d.state || "Tamil Nadu",
          pincode: d.pincode,
          items: [
            {
              productId: String(p.id),
              name: p.name,
              category: p.category,
              size: c.size,
              price: c.unitPrice,
              qty: c.qty,
              image: p.image,
            },
          ],
          subtotal: c.subtotal,
          shipping: c.shipping,
          total: c.total,
        };

        try {
          const result = await handleRazorpay(orderPayload, p, c);
          if (result && result.ok) {
            state.checkout.delivery = {};
            state.checkout.product = null;
            state.checkout.size = null;
            state.checkout.qty = 1;
            state.checkout.unitPrice = 0;
            state.checkout.subtotal = 0;
            state.checkout.total = 0;
          }
        } catch (err) {
          console.error("[MRP] Razorpay flow failed:", err);
          toast(
            err && err.message
              ? err.message
              : "Payment could not be completed. Please try again.",
          );
        } finally {
          if (btn) btn.disabled = false;
          state._orderLock = false;
        }
      }

      async function handleRazorpay(orderPayload, p, c) {
        if (!window.Razorpay) {
          throw new Error("Payment gateway not loaded. Check your connection.");
        }

        const amountPaise = c.total * 100;
        let rzpOrderId;

        if (window.MRPDB) {
          try {
            showLoading("Preparing payment...");
            const rzpOrder = await MRPDB.createRazorpayOrder(
              amountPaise,
              `order_${Date.now()}`,
            );
            rzpOrderId = rzpOrder.id;
          } catch (e) {
            console.warn(
              "[MRP] createRazorpayOrder unavailable, using client-only checkout:",
              e.message,
            );
          } finally {
            hideLoading();
          }
        }

        return new Promise((resolve, reject) => {
          let settled = false;
          const finish = (fn) => {
            if (settled) return;
            settled = true;
            fn();
          };

          const options = {
            key: RAZORPAY_KEY_ID,
            amount: amountPaise,
            currency: "INR",
            name: "MRP Mens Wear",
            description: `Order: ${p.name} (${c.size}) × ${c.qty}`,
            ...(rzpOrderId ? { order_id: rzpOrderId } : {}),
            prefill: {},
            theme: { color: "#ff6a00" },
            handler: async function (resp) {
              showLoading("Verifying payment...");
              try {
                if (!window.MRPDB) {
                  setLastOrder({
                    id: "RZP-" + resp.razorpay_payment_id,
                    ...orderPayload,
                    payment_status: "paid",
                  });
                  finish(() => {
                    toast("Payment verified! (Sample mode)");
                    go("orderconfirm", { id: state.lastOrder.id });
                    resolve({ ok: true, orderId: state.lastOrder.id });
                  });
                  return;
                }

                let verified = false;
                let verificationError = null;
                try {
                  const verification = await MRPDB.verifyPayment({
                    razorpay_payment_id: resp.razorpay_payment_id,
                    razorpay_order_id: resp.razorpay_order_id || "",
                    razorpay_signature: resp.razorpay_signature || "",
                    order: orderPayload,
                  });
                  verified = Boolean(verification && verification.ok !== false);
                } catch (verifyErr) {
                  verificationError = verifyErr;
                  const message = String(verifyErr?.message || "");
                  if (
                    /verification service is unavailable|not found|function|failed to fetch|timed out|network|load failed/i.test(
                      message,
                    )
                  ) {
                    console.warn(
                      "[MRP] verify-payment edge function unavailable; continuing with order creation.",
                      message,
                    );
                    verified = true;
                  } else {
                    console.warn(
                      "[MRP] verifyPayment failed; order was not placed:",
                      message,
                    );
                  }
                }

                if (!verified) {
                  const msg =
                    verificationError?.message ||
                    "Payment verification failed.";
                  finish(() => {
                    toast(`Payment could not be verified: ${msg}`);
                    resolve({ ok: false, reason: "verification_failed" });
                  });
                  return;
                }

                const rzpSaved = await saveOrderToSupabase(
                  orderPayload,
                  "razorpay",
                  "paid",
                  {
                    razorpay_payment_id: resp.razorpay_payment_id || null,
                    razorpay_order_id: resp.razorpay_order_id || null,
                  },
                );
                const orderId =
                  rzpSaved && rzpSaved.id ? String(rzpSaved.id) : null;
                if (orderId) {
                  setLastOrder({
                    id: orderId,
                    ...orderPayload,
                    payment_status: "paid",
                    payment_method: "razorpay",
                    status: "placed",
                    razorpay_payment_id: resp.razorpay_payment_id || null,
                    razorpay_order_id: resp.razorpay_order_id || null,
                    created_at: new Date().toISOString(),
                  });
                  await refreshProductStock(p.id);
                  finish(() => {
                    toast("Order placed successfully!");
                    go("orderconfirm", { id: orderId });
                    resolve({ ok: true, orderId });
                  });
                } else {
                  finish(() => {
                    toast(
                      "Payment completed but your order could not be saved. Please contact support.",
                    );
                    resolve({ ok: false, reason: "order_save_failed" });
                  });
                }
              } catch (err) {
                console.error("verify-payment error:", err);
                finish(() => {
                  toast(
                    err && err.message
                      ? err.message
                      : "Payment could not be completed. Please try again.",
                  );
                  resolve({ ok: false, reason: "payment_error" });
                });
              } finally {
                hideLoading();
              }
            },
            modal: {
              ondismiss: function () {
                finish(() => {
                  toast("Payment cancelled");
                  reject(new Error("Payment cancelled"));
                });
              },
            },
          };

          try {
            const rzp = new window.Razorpay(options);
            rzp.on("payment.failed", function (r) {
              console.error("Razorpay payment failed:", r.error);
              finish(() => {
                toast(
                  "Payment failed: " +
                    (r.error.description || "Please try again."),
                );
                reject(new Error(r.error.description || "Payment failed"));
              });
            });
            rzp.open();
          } catch (err) {
            console.error("Razorpay open error:", err);
            finish(() => {
              toast("Could not start payment. Please refresh and try again.");
              reject(err);
            });
          }
        });
      }

      /* Refresh a single product's stock from Supabase after an order */
      async function refreshProductStock(productId, options = {}) {
        if (state.usingSample || !window.MRPDB) return;
        try {
          const stockData = await MRPDB.getProductStock(productId);
          if (stockData && stockData.sizes) {
            const prod = findProduct(productId);
            if (prod) {
              const normalized = normalizeProductStock({
                ...prod,
                total_stock: stockData.total_stock,
                sizes: stockData.sizes || [],
              });
              prod.sizes = normalized.sizes;
              prod.total_stock = normalized.total_stock;
              if (
                state.checkout &&
                state.checkout.product &&
                String(state.checkout.product.id) === String(productId)
              ) {
                state.checkout.product = {
                  ...state.checkout.product,
                  ...normalized,
                  sizes: normalized.sizes,
                  total_stock: normalized.total_stock,
                };
              }
            }
          }
          if (options.rerender !== false && routes[routeState.name]) {
            renderRoute(routeState.name, routeState.params, { runMount: true });
          }
        } catch (e) {
          console.warn("[MRP] stock refresh failed:", e.message);
        }
      }

      async function loadOrders(phone = null) {
        const list = $("#ordList");
        list.innerHTML = `<div class="skeleton" style="height:120px"></div><div class="skeleton" style="height:120px;margin-top:10px"></div>`;
        try {
          // If logged in, remote orders are the source of truth.
          if (window.MRPDB && state.auth.user?.id) {
            const remoteOrders = await MRPDB.fetchCustomerOrders(
              state.auth.user.id,
            ).catch(() => []);

            // Also check local orderHistory for recently placed orders
            const localOrders = state.orderHistory || [];

            // Merge remote and local orders, deduplicating by order ID
            // Local orders take precedence (for recently placed orders)
            const allOrdersMap = new Map();
            (remoteOrders || []).forEach((order) => {
              if (order && order.id) allOrdersMap.set(String(order.id), order);
            });
            localOrders.forEach((order) => {
              if (order && order.id) allOrdersMap.set(String(order.id), order);
            });

            const orders = sortOrdersForDisplay(
              Array.from(allOrdersMap.values()),
            );
            if (!orders.length) {
              list.innerHTML = `<div class="empty">${I.box}<p>No orders found yet</p></div>`;
              return;
            }

            list.innerHTML = orders
              .map((o, index) => {
                const items = Array.isArray(o.items)
                  ? o.items
                  : typeof o.items === "string"
                    ? (() => {
                        try {
                          return JSON.parse(o.items);
                        } catch (e) {
                          return [];
                        }
                      })()
                    : [];
                const firstItem = items[0] || {};
                const itemCount = items.length;
                const serialNumber = index + 1;
                return `
                  <div class="order-card" onclick="go('orderdetails',{id:'${o.id}'})">

          await loadProducts({ rerender: false });

            // Logged in: go to target route (unless it's auth) or default to home
            const dest =
              initialRoute.name && initialRoute.name !== "auth"
                ? initialRoute.name
                : "home";
            go(dest, initialRoute.params || {}, { replace: true });
          } else {
            // Not logged in: go to auth page (with signup or login depending on first-time status)
            go("auth", { mode: defaultAuthMode() }, { replace: true });
          }
        } catch (e) {
          console.error("[MRP] boot error:", e);
        } finally {
          hideLoading();
        }

      const FALLBACK_IMG =
        "data:image/svg+xml;utf8," +
        encodeURIComponent(

        );
      document.addEventListener(
        "error",
        (e) => {
          const el = e.target;
          if (
            el &&
            el.tagName === "IMG" &&
            el.src !== FALLBACK_IMG &&
            !el.dataset.fallbackApplied
          ) {
            el.dataset.fallbackApplied = "1";
            el.src = FALLBACK_IMG;

      /* Show Policy Modal */
      function showPolicy(policyKey) {
        const policy = POLICY_CONTENT[policyKey];
        if (!policy) return;

        const modal = document.getElementById("policyModal");
        const title = document.getElementById("policyTitle");
        const body = document.getElementById("policyBody");

        if (modal && title && body) {
          title.textContent = policy.title;
          body.innerHTML = policy.content;
          modal.classList.add("active");
          document.body.style.overflow = "hidden";
        }
      }

      /* Close Policy Modal */
      function closePolicy(event) {
        if (event && event.target !== event.currentTarget) return;
        const modal = document.getElementById("policyModal");
        if (modal) {
          modal.classList.remove("active");
          document.body.style.overflow = "";
        }
      }

      /* Expand/collapse a footer link section (Quick Links / Policies / Help) */
      function toggleFooterSection(el) {
        const list = el.nextElementSibling;
        const toggle = el.querySelector(".pro-footer__links-toggle");
        if (list) list.classList.toggle("open");
        if (toggle) toggle.classList.toggle("open");
      }
    </script>
